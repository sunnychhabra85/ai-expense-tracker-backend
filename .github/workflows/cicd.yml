name: ci-cd

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: finance-platform-dev-minimal

jobs:
  install-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        run: npm test

  build-push:
    needs: install-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, upload-service, processing-service, analytics-service, notification-service]
        include:
          - service: auth-service
            port: 3001
          - service: upload-service
            port: 3002
          - service: processing-service
            port: 3003
          - service: analytics-service
            port: 3004
          - service: notification-service
            port: 3005
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_REPO: finance-platform/dev/${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            --build-arg PORT=${{ matrix.port }} \
            -f apps/${{ matrix.service }}/Dockerfile \
            -t $REGISTRY/$IMAGE_REPO:$IMAGE_TAG \
            -t $REGISTRY/$IMAGE_REPO:latest \
            .
      - name: Push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_REPO: finance-platform/dev/${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$IMAGE_REPO:$IMAGE_TAG
          docker push $REGISTRY/$IMAGE_REPO:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
      - name: Set image tags in manifests
        run: |
          REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com
          for svc in auth-service upload-service processing-service analytics-service notification-service; do
            sed -i "s|REPLACE_WITH_ECR/${svc}:latest|${REGISTRY}/finance-platform/dev/${svc}:${GITHUB_SHA}|g" infrastructure/k8s/${svc}/all.yaml
          done
      - name: Deploy
        run: |
          kubectl apply -f infrastructure/k8s/base/namespace.yaml
          
          # Deploy databases first
          kubectl apply -f infrastructure/k8s/base/postgres.yaml
          kubectl apply -f infrastructure/k8s/base/redis.yaml
          
          # Wait for databases to be ready
          kubectl wait --for=condition=Ready pod -l app=postgres -n finance-platform --timeout=180s
          kubectl wait --for=condition=Ready pod -l app=redis -n finance-platform --timeout=180s
          
          # Run database migrations
          REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com
          kubectl delete pod prisma-migrate -n finance-platform --ignore-not-found=true
          kubectl run prisma-migrate \
            --image=${REGISTRY}/finance-platform/dev/auth-service:${GITHUB_SHA} \
            --restart=Never \
            --namespace=finance-platform \
            --env="DATABASE_URL=postgresql://admin:localpassword123@postgres:5432/financedb" \
            --command -- sh -c "npx prisma migrate deploy --schema=/app/libs/database/prisma/schema.prisma" || true
          
          # Deploy application services
          kubectl apply -f infrastructure/k8s/auth-service/all.yaml
          kubectl apply -f infrastructure/k8s/upload-service/all.yaml
          kubectl apply -f infrastructure/k8s/processing-service/all.yaml
          kubectl apply -f infrastructure/k8s/analytics-service/all.yaml
          kubectl apply -f infrastructure/k8s/notification-service/all.yaml
          kubectl apply -f infrastructure/k8s/base/ingress.yaml
      - name: Rollout checks
        run: |
          kubectl rollout status deployment/auth-service -n finance-platform --timeout=180s
          kubectl rollout status deployment/upload-service -n finance-platform --timeout=180s
          kubectl rollout status deployment/processing-service -n finance-platform --timeout=180s
          kubectl rollout status deployment/analytics-service -n finance-platform --timeout=180s
          kubectl rollout status deployment/notification-service -n finance-platform --timeout=180s
