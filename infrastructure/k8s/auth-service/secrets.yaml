# =============================================================
# infrastructure/k8s/auth-service/secrets.yaml
# External Secrets Operator syncs AWS Secrets Manager → K8s Secrets
# Install ESO first: helm install external-secrets ...
# =============================================================

# ExternalSecret: tells ESO what to sync from AWS
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: finance
spec:
  refreshInterval: 1h   # Re-sync every hour

  secretStoreRef:
    name: aws-secrets-manager  # Defined in cluster-secret-store.yaml
    kind: ClusterSecretStore

  target:
    name: auth-service-secrets  # K8s Secret name to create
    creationPolicy: Owner

  # Map AWS Secrets Manager keys → K8s Secret keys
  data:
    - secretKey: DATABASE_URL          # K8s secret key
      remoteRef:
        key: prod/finance-platform/db  # AWS Secrets Manager secret name
        property: url                   # JSON property within the secret

    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: prod/finance-platform/jwt
        property: accessSecret

    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: prod/finance-platform/jwt
        property: refreshSecret

    - secretKey: REDIS_URL
      remoteRef:
        key: prod/finance-platform/redis
        property: url
---
# ClusterSecretStore: tells ESO how to access AWS
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Uses IRSA — no static credentials needed!
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
