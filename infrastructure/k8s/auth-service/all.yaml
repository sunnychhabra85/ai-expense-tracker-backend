apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: finance-platform
data:
  NODE_ENV: production
  PORT: "3001"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: finance-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql://admin:localpassword123@postgres:5432/financedb"
  JWT_ACCESS_SECRET: "local-dev-access-secret-min-32-chars-ok"
  JWT_REFRESH_SECRET: "local-dev-refresh-secret-different-value"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: finance-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 014071048720.dkr.ecr.ap-south-1.amazonaws.com/finance-platform/dev/auth-service:latest
          imagePullPolicy: Always
          # image: 014071048720.dkr.ecr.ap-south-1.amazonaws.com/finance-platform/dev/auth-service:latest
          # imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: finance-platform
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: finance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
