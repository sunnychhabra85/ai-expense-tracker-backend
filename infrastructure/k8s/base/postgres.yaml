apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: finance-platform
data:
  POSTGRES_DB: financedb
  POSTGRES_USER: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: finance-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: localpassword123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: finance-platform
spec:
  replicas: 1
  strategy:
    type: Recreate  # Avoid two pods during updates on small nodes
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres
      volumes:
        - name: postgres-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: finance-platform
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
