# =============================================================
# infrastructure/k8s/namespace.yaml
# Create isolated namespace for all finance platform services
# Apply: kubectl apply -f infrastructure/k8s/namespace.yaml
# =============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: finance
  labels:
    name: finance
    environment: production
---
# ResourceQuota — prevents any one service from consuming all cluster resources
apiVersion: v1
kind: ResourceQuota
metadata:
  name: finance-quota
  namespace: finance
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "50"
---
# LimitRange — sets default resource limits on pods that don't specify them
apiVersion: v1
kind: LimitRange
metadata:
  name: finance-limits
  namespace: finance
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
