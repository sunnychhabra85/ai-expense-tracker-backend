apiVersion: v1
kind: ConfigMap
metadata:
  name: upload-service-config
  namespace: finance-platform
data:
  NODE_ENV: production
  PORT: "3002"
---
apiVersion: v1
kind: Secret
metadata:
  name: upload-service-secret
  namespace: finance-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql://admin:localpassword123@postgres:5432/financedb"
  JWT_ACCESS_SECRET: "local-dev-access-secret-min-32-chars-ok"
  AWS_REGION: "ap-south-1"
  # S3 and SQS not configured in minimal deployment
  # AWS_S3_BUCKET: "finance-platform-uploads-dev"
  # AWS_SQS_PROCESSING_URL: "http://192.168.0.252:4566/000000000000/document-processing"
  # AWS_ENDPOINT_URL: "http://192.168.0.252:4566"
  # AWS_ACCESS_KEY_ID: "test"
  # AWS_SECRET_ACCESS_KEY: "test"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: finance-platform
spec:
  replicas: 1
  strategy:
    type: Recreate  # Use Recreate for single-node t3.small to avoid resource exhaustion
  selector:
    matchLabels:
      app: upload-service
  template:
    metadata:
      labels:
        app: upload-service
    spec:
      containers:
        - name: upload-service
          image: 014071048720.dkr.ecr.ap-south-1.amazonaws.com/finance-platform/dev/upload-service:latest
          imagePullPolicy: Always
          # image: 014071048720.dkr.ecr.ap-south-1.amazonaws.com/finance-platform/dev/upload-service:latest
          # imagePullPolicy: Always
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: upload-service-config
            - secretRef:
                name: upload-service-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5  # Increased timeout for S3/DB checks
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: upload-service
  namespace: finance-platform
spec:
  selector:
    app: upload-service
  ports:
    - port: 80
      targetPort: 3002
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-service-hpa
  namespace: finance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
