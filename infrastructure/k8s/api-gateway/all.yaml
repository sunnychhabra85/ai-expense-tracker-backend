apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: finance-platform
data:
  NODE_ENV: production
  PORT: "3000"
  # Microservice URLs (internal cluster DNS)
  AUTH_SERVICE_URL: "http://auth-service:80"
  UPLOAD_SERVICE_URL: "http://upload-service:80"
  PROCESSING_SERVICE_URL: "http://processing-service:80"
  ANALYTICS_SERVICE_URL: "http://analytics-service:80"
  NOTIFICATION_SERVICE_URL: "http://notification-service:80"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  namespace: finance-platform
type: Opaque
stringData:
  JWT_ACCESS_SECRET: "local-dev-access-secret-min-32-chars-ok"
  JWT_REFRESH_SECRET: "local-dev-refresh-secret-different-value"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: finance-platform
spec:
  replicas: 1
  strategy:
    type: Recreate  # Use Recreate for single-node t3.small to avoid resource exhaustion
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: 014071048720.dkr.ecr.ap-south-1.amazonaws.com/finance-platform/dev/api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: api-gateway-config
            - secretRef:
                name: api-gateway-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: finance-platform
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: finance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
