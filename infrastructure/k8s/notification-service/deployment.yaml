# infrastructure/k8s/notification-service/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: finance
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      serviceAccountName: notification-service-sa
      terminationGracePeriodSeconds: 60  # Allow SSE connections to drain
      containers:
        - name: notification-service
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          envFrom:
            - secretRef:
                name: notification-service-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3005"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 300m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: 3005 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 3005 }
            initialDelaySeconds: 30
            periodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: finance
spec:
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 3005
  type: ClusterIP
---
# infrastructure/k8s/notification-service/secrets.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: notification-service-secrets
  namespace: finance
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: notification-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: prod/finance-platform/db
        property: url
    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: prod/finance-platform/jwt
        property: accessSecret
