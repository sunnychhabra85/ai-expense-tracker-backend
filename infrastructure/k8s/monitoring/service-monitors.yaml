# =============================================================
# ServiceMonitors for Prometheus to scrape Finance Platform services
# Apply with: kubectl apply -f service-monitors.yaml
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: auth-service-metrics
  namespace: finance-platform
  labels:
    app: auth-service
    metrics: "true"
spec:
  selector:
    app: auth-service
  ports:
    - name: metrics
      port: 3001
      targetPort: 3001
      protocol: TCP

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: auth-service
  namespace: finance-platform
  labels:
    app: auth-service
    release: prometheus
spec:
  selector:
    matchLabels:
      app: auth-service
      metrics: "true"
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

