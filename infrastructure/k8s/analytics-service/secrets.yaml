# infrastructure/k8s/analytics-service/secrets.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: analytics-service-secrets
  namespace: finance
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: analytics-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: prod/finance-platform/db
        property: url
    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: prod/finance-platform/jwt
        property: accessSecret
    - secretKey: REDIS_URL
      remoteRef:
        key: prod/finance-platform/redis
        property: url
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: prod/finance-platform/ai
        property: anthropicApiKey
