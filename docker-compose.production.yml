# =============================================================
# docker-compose.production.yml — AWS EC2 Single Instance Deployment
# Optimized for t2.micro (1GB RAM, 1 vCPU)
# Usage: docker-compose -f docker-compose.production.yml up -d --build
# =============================================================

version: "3.9"

services:
  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financedb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-financedb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - finance_network
    # Memory limits for t2.micro
    mem_limit: 256m
    mem_reservation: 128m

  redis:
    image: redis:7-alpine
    container_name: finance_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - finance_network
    mem_limit: 64m
    mem_reservation: 32m

  # ── Application Services ───────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
      target: runner
      args:
        SERVICE_NAME: auth-service
        PORT: 3001
    container_name: finance_auth
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-financedb}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-10}"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - finance_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 128m
    mem_reservation: 64m

  upload-service:
    build:
      context: .
      dockerfile: apps/upload-service/Dockerfile
      target: runner
      args:
        SERVICE_NAME: upload-service
        PORT: 3002
    container_name: finance_upload
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-financedb}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_SQS_PROCESSING_URL: ${AWS_SQS_PROCESSING_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - finance_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 128m
    mem_reservation: 64m

  processing-service:
    build:
      context: .
      dockerfile: apps/processing-service/Dockerfile
      target: runner
      args:
        SERVICE_NAME: processing-service
        PORT: 3003
    container_name: finance_processing
    environment:
      NODE_ENV: production
      PORT: "3003"
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-financedb}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_SQS_PROCESSING_URL: ${AWS_SQS_PROCESSING_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - finance_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 128m
    mem_reservation: 64m

  analytics-service:
    build:
      context: .
      dockerfile: apps/analytics-service/Dockerfile
      target: runner
      args:
        SERVICE_NAME: analytics-service
        PORT: 3004
    container_name: finance_analytics
    environment:
      NODE_ENV: production
      PORT: "3004"
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-financedb}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CACHE_TTL_SECONDS: "300"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - finance_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 128m
    mem_reservation: 64m

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
      target: runner
      args:
        SERVICE_NAME: notification-service
        PORT: 3005
    container_name: finance_notification
    environment:
      NODE_ENV: production
      PORT: "3005"
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-financedb}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - finance_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 128m
    mem_reservation: 64m

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: runner
      args:
        SERVICE_NAME: api-gateway
        PORT: 3000
    container_name: finance_api_gateway
    environment:
      NODE_ENV: production
      PORT: "3000"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Microservice URLs
      AUTH_SERVICE_URL: http://auth-service:3001
      UPLOAD_SERVICE_URL: http://upload-service:3002
      PROCESSING_SERVICE_URL: http://processing-service:3003
      ANALYTICS_SERVICE_URL: http://analytics-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      auth-service:
        condition: service_healthy
      upload-service:
        condition: service_healthy
      processing-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    restart: always
    networks:
      - finance_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 128m
    mem_reservation: 64m

  # ── Nginx Reverse Proxy ────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: finance_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
    restart: always
    networks:
      - finance_network
    mem_limit: 32m
    mem_reservation: 16m

volumes:
  pgdata:
    name: finance_pgdata

networks:
  finance_network:
    name: finance_network
    driver: bridge
