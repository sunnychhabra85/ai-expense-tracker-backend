# =============================================================
# docker-compose.yml — Complete Local Development Stack
# Runs ALL 5 microservices + Postgres + Redis + LocalStack
# Usage: cp .env.example .env && docker compose up -d --build
# =============================================================

version: "3.9"

services:
  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financedb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword123}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-financedb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finance_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-localredispass}
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-localredispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    container_name: finance_localstack
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    environment:
      SERVICES: s3,sqs,textract
      AWS_DEFAULT_REGION: ${AWS_REGION:-ap-south-1}
      LOCALSTACK_HOST: localstack
    volumes:
      - localstackdata:/var/lib/localstack
      - ./infrastructure/scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finance_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── Application Services ───────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: runner
    container_name: finance_api_gateway
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-min-32-chars-ok}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-different-value}
      # Microservice URLs
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      UPLOAD_SERVICE_URL: ${UPLOAD_SERVICE_URL:-http://upload-service:3002}
      PROCESSING_SERVICE_URL: ${PROCESSING_SERVICE_URL:-http://processing-service:3003}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL:-http://analytics-service:3004}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:3005}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    depends_on:
      auth-service:
        condition: service_healthy
      upload-service:
        condition: service_healthy
      processing-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
      target: runner
    container_name: finance_auth
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3001"
      # Override .env with Docker internal hostname
      DATABASE_URL: postgresql://admin:localpassword123@postgres:5432/financedb
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-min-32-chars-ok}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-different-value}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-10}"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  upload-service:
    build:
      context: .
      dockerfile: apps/upload-service/Dockerfile
      target: runner
    container_name: finance_upload
    ports:
      - "${UPLOAD_SERVICE_PORT:-3002}:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3002"
      # Override .env with Docker internal hostnames
      DATABASE_URL: postgresql://admin:localpassword123@postgres:5432/financedb
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-min-32-chars-ok}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-finance-platform-uploads-dev}
      AWS_SQS_PROCESSING_URL: http://localstack:4566/000000000000/document-processing
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_PUBLIC_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  processing-service:
    build:
      context: .
      dockerfile: apps/processing-service/Dockerfile
      target: runner
    container_name: finance_processing
    ports:
      - "${PROCESSING_SERVICE_PORT:-3003}:3003"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3003"
      # Override .env with Docker internal hostnames
      DATABASE_URL: postgresql://admin:localpassword123@postgres:5432/financedb
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-finance-platform-uploads-dev}
      AWS_SQS_PROCESSING_URL: http://localstack:4566/000000000000/document-processing
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_PUBLIC_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  analytics-service:
    build:
      context: .
      dockerfile: apps/analytics-service/Dockerfile
      target: runner
    container_name: finance_analytics
    ports:
      - "${ANALYTICS_SERVICE_PORT:-3004}:3004"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3004"
      # Override .env with Docker internal hostnames
      DATABASE_URL: postgresql://admin:localpassword123@postgres:5432/financedb
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-min-32-chars-ok}
      REDIS_URL: redis://:localredispass@redis:6379
      CACHE_TTL_SECONDS: "300"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
      target: runner
    container_name: finance_notification
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3005}:3005"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3005"
      # Override .env with Docker internal hostnames
      DATABASE_URL: postgresql://admin:localpassword123@postgres:5432/financedb
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-min-32-chars-ok}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: finance_pgdata
  pgadmin_data:
    name: finance_pgadmin
  localstackdata:
    name: finance_localstack

networks:
  default:
    name: finance_network
